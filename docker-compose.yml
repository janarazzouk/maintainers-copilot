services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mc-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - mc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: mc-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: mc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mc_minio:/data

  vault:
    image: hashicorp/vault:latest
    container_name: mc-vault
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/file
      - ./infra/vault/config.hcl:/vault/config/config.hcl:ro
    command: vault server -config=/vault/config/config.hcl

  vault-init:
    image: hashicorp/vault:latest
    container_name: mc-vault-init
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN_FILE: /run/secrets/vault_token
    secrets:
      - vault_token
    volumes:
      - ./infra/vault/seed.sh:/seed.sh:ro
    depends_on:
      vault:
        condition: service_started
    cap_add:
      - IPC_LOCK
    entrypoint: ["/bin/sh", "/seed.sh"]

  migrate:
    build:
      context: ./apps/api
    container_name: mc-migrate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  api:
    build:
      context: ./apps/api
    container_name: mc-api
    env_file:
      - .env
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      vault-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    environment:
        EMBEDDING_CACHE_DIR: /models/fastembed
        VAULT_TOKEN_FILE: /run/secrets/vault_token
    secrets:
      - vault_token
    volumes:
      - fastembed-cache:/models/fastembed    
      

  model-server:
    build:
      context: ./apps/model_server
    container_name: mc-model-server
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_DEV_ROOT_TOKEN_ID: root
      MODEL_SERVER_VAULT_SECRET_PATH: app
      MODEL_SERVER_MODEL_DIR: artifacts/roberta_issue_classifier
      MODEL_SERVER_GEMINI_MODEL: gemini-3.5-flash
    depends_on:
      vault-init:
        condition: service_completed_successfully
    ports:
      - "8001:8001"

  chatbot:
    build:
      context: ./apps/chatbot
    container_name: mc-chatbot
    env_file:
      - .env
    ports:
      - "${CHATBOT_PORT}:8501"
    depends_on:
      api:
        condition: service_started

  widget:
    build:
      context: ./apps/widget
    container_name: mc-widget
    ports:
      - "${WIDGET_PORT}:80"

  host:
    build:
      context: ./demo/host
    container_name: mc-host
    ports:
      - "${HOST_PORT}:80"
    depends_on:
      widget:
        condition: service_started

volumes:
  mc_pgdata:
  mc_minio:
  vault-data:
  fastembed-cache:

secrets:
  vault_token:
    file: ./.secrets/vault_token  